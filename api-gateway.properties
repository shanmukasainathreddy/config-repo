server.port=8080
spring.application.name=api-gateway

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[2].id=startup-service
spring.cloud.gateway.routes[2].uri=lb://startup-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/startups/**

spring.cloud.gateway.routes[3].id=team-service
spring.cloud.gateway.routes[3].uri=lb://team-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/teams/**

spring.cloud.gateway.routes[4].id=investment-service
spring.cloud.gateway.routes[4].uri=lb://investment-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/investments/**

spring.cloud.gateway.routes[5].id=messaging-service
spring.cloud.gateway.routes[5].uri=lb://messaging-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/messages/**

spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://notification-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/notifications/**
